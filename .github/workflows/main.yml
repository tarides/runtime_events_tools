name: main

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Prime the caches every Monday
    - cron: 0 1 * * MON

jobs:
  build:

    strategy:
      fail-fast: false
      matrix:
        ocaml-compiler:
          - 5.0
          - 5.1
          - 5.2
          - 5.3
          - 5.4
        os:
          - ubuntu-latest
          - macos-15
        include:
          - ocaml-compiler: ocaml-base-compiler.5.5.0~alpha3
            os: ubuntu-latest
            experimental: true
          - ocaml-compiler: ocaml-base-compiler.5.5.0~alpha3
            os: macos-15
            experimental: true

    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental == true }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use OCaml ${{ matrix.ocaml-compiler }}
        uses: ocaml/setup-ocaml@v3
        with:
          opam-pin: false
          opam-depext: false
          ocaml-compiler: ${{ matrix.ocaml-compiler }}


      - run: opam install . --deps-only --with-test

      - run: opam exec -- dune build

      - run: opam exec -- dune runtest

      - run: |
          opam install . --with-dev-setup --with-test --deps-only
          opam exec -- dune build @fmt
